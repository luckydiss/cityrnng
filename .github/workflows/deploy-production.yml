name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy env file
        run: |
          ssh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" "mkdir -p '${{ secrets.PROD_APP_DIR }}'"
          printf '%s' "${{ secrets.PROD_ENV_FILE }}" | ssh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" "cat > '${{ secrets.PROD_APP_DIR }}/.env'"

      - name: Deploy on production host
        run: |
          ssh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "export IMAGE='${{ secrets.REGISTRY_URL }}/${{ secrets.IMAGE_NAME }}:${{ inputs.image_tag }}' && bash '${{ secrets.PROD_APP_DIR }}/deploy-production.sh'"

      - name: Run health check
        run: |
          curl --fail --retry 5 --retry-delay 5 "https://app.example.com/api/v1/health"

      - name: Deployment note
        run: echo "Replace app.example.com and prepare deploy-production.sh on the server before enabling this workflow."
